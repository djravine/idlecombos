on:
  push:
    tags:
      - 'v*'

name: Create Release

jobs:

  validate:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
    - name: Install AutoHotkey
      run: choco install autohotkey.install --version=1.1.37.1 -y
    - name: Lint Markdown
      uses: DavidAnson/markdownlint-cli2-action@05f32210e84442804257b2a6f20b273450ec8265 # v19.1.0
      with:
        globs: '**/*.md #!Lib/**'
    - name: Syntax check IdleCombos.ahk
      run: |
        $ahk = "C:\Program Files\AutoHotkey\AutoHotkey.exe"
        $proc = Start-Process -FilePath $ahk -ArgumentList "/iLib NUL /ErrorStdOut `"$PWD\IdleCombos.ahk`"" -Wait -PassThru -NoNewWindow -RedirectStandardError "$env:TEMP\ahk_err.txt"
        $err = Get-Content "$env:TEMP\ahk_err.txt" -ErrorAction SilentlyContinue
        if ($err) { Write-Host $err; exit 1 }
        Write-Host "Syntax check passed"
    - name: Syntax check IdleCombosLib.ahk
      run: |
        $ahk = "C:\Program Files\AutoHotkey\AutoHotkey.exe"
        $proc = Start-Process -FilePath $ahk -ArgumentList "/iLib NUL /ErrorStdOut `"$PWD\IdleCombosLib.ahk`"" -Wait -PassThru -NoNewWindow -RedirectStandardError "$env:TEMP\ahk_err.txt"
        $err = Get-Content "$env:TEMP\ahk_err.txt" -ErrorAction SilentlyContinue
        if ($err) { Write-Host $err; exit 1 }
        Write-Host "Syntax check passed"
    - name: Version string consistency
      run: |
        $ahk_ver = (Select-String -Path "IdleCombos.ahk" -Pattern 'VersionNumber\s*:=\s*"([^"]+)"' | ForEach-Object { $_.Matches[0].Groups[1].Value })
        $readme_ver = (Select-String -Path "README.md" -Pattern '\*\*v([^\*]+)\*\*' | ForEach-Object { $_.Matches[0].Groups[1].Value })
        Write-Host "IdleCombos.ahk version: $ahk_ver"
        Write-Host "README.md version: $readme_ver"
        if ($ahk_ver -ne $readme_ver) { Write-Host "ERROR: Version mismatch!"; exit 1 }
        Write-Host "Version strings match"
    - name: Run unit tests
      run: |
        $ahk = "C:\Program Files\AutoHotkey\AutoHotkey.exe"
        & $ahk "$PWD\tests\run_tests_ci.ahk"
      timeout-minutes: 2

  build:
    needs: validate
    runs-on: ubuntu-latest
    env:
      ARCHIVE_NAME: ${{ github.event.repository.name }}-${{github.ref_name}}
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
    - name: Make Release Folder
      run: mkdir "$ARCHIVE_NAME"
    - name: Copy files
      run: cp -r *.ahk idledict.json *.ico README.md CHANGELOG.md CONTRIBUTING.md USER_MANUAL.md LICENSE "$ARCHIVE_NAME"
    - name: Make Lib Folder
      run: mkdir "$ARCHIVE_NAME/Lib"
    - name: Copy Lib
      run: cp Lib/ScrollBox.ahk "$ARCHIVE_NAME/Lib/"
    - name: Make Image Folder
      run: mkdir "$ARCHIVE_NAME/images"
    - name: Copy Images
      run: cp -r images/*.png "$ARCHIVE_NAME/images"
    - name: Archive Release TAR.GZ - No Themes
      run: tar -czf "$ARCHIVE_NAME"-no-themes.tar.gz "$ARCHIVE_NAME"
    - name: Archive Release ZIP - No Themes
      run: zip -r "$ARCHIVE_NAME"-no-themes.zip "$ARCHIVE_NAME"
    - name: Make Styles Folder
      run: mkdir "$ARCHIVE_NAME/styles"
    - name: Copy Styles
      run: cp -r styles/*.msstyles "$ARCHIVE_NAME/styles"
    - name: Copy Theme DLL
      run: cp -r styles/USkin.dll "$ARCHIVE_NAME/styles"
    - name: Archive Release TAR.GZ - With Themes
      run: tar -czf "$ARCHIVE_NAME"-themes.tar.gz "$ARCHIVE_NAME"
    - name: Archive Release ZIP - With Themes
      run: zip -r "$ARCHIVE_NAME"-themes.zip "$ARCHIVE_NAME"
    - name: Generate SHA-256 checksums
      run: |
        sha256sum *.zip *.tar.gz > SHA256SUMS.txt
        cat SHA256SUMS.txt
    - name: Upload Release
      uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
      with:
        allowUpdates: true
        artifacts: "*.zip,*.tar.gz,SHA256SUMS.txt"
        draft: true
        removeArtifacts: true
        replacesArtifacts: true
        token: ${{ secrets.GITHUB_TOKEN }}
