on:
  release:
    types:
      - 'published'

name: Publish Release

jobs:

  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Discord Publish
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          RELEASE_NAME="${{ github.event.release.name }}"
          RELEASE_URL="${{ github.event.release.html_url }}"
          PUBLISHED_AT="${{ github.event.release.published_at }}"
          RELEASE_ID="${{ github.event.release.id }}"

          # Skip if webhook not configured
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "::warning::DISCORD_WEBHOOK secret not set — skipping notification"
            exit 0
          fi

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"New Release\",
                \"description\": \"**NEW:** ${RELEASE_NAME} has been released.\n\n**DOWNLOAD:** [${RELEASE_NAME}](${RELEASE_URL})\",
                \"color\": 3066993,
                \"footer\": {
                  \"text\": \"PUBLISHED: ${PUBLISHED_AT} ID: ${RELEASE_ID}\"
                }
              }]
            }" \
            "$DISCORD_WEBHOOK")

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::Discord webhook failed with HTTP $HTTP_STATUS"
            exit 1
          fi
